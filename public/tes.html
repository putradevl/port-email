<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saputra Luhur Pambudi</title>
    <link rel="apple-touch-icon" sizes="57x57" href="https://cdn.putradev.my.id/port/favico/apple-icon-57x57.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://cdn.putradev.my.id/port/favico/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://cdn.putradev.my.id/port/favico/favicon-16x16.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Epilogue:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #0a0a0a;
            --white: #fafaf7;
            --yellow: #ffe135;
            --pink: #ff6b9d;
            --blue: #5b8dee;
            --green: #3ecf8e;
            --border: 3px solid #0a0a0a;
            --shadow: 5px 5px 0px #0a0a0a;
            --shadow-lg: 8px 8px 0px #0a0a0a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Epilogue', sans-serif;
            background-color: var(--white);
            color: var(--black);
            overflow-x: hidden;
        }

        /* NOISE TEXTURE OVERLAY */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.4;
        }

        /* ========================
           HEADER
        ======================== */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: var(--yellow);
            border-bottom: var(--border);
            padding: 0 2rem;
        }

        .nav-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
            height: 64px;
        }

        .logo {
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 1rem;
            color: var(--black);
            text-decoration: none;
            letter-spacing: -0.5px;
            border: var(--border);
            padding: 6px 14px;
            background: var(--black);
            color: var(--yellow);
            box-shadow: var(--shadow);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .logo:hover { transform: translate(-2px, -2px); box-shadow: var(--shadow-lg); }

        nav ul {
            display: flex;
            list-style: none;
            gap: 4px;
            align-items: center;
        }

        nav a {
            font-family: 'Space Mono', monospace;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--black);
            text-decoration: none;
            padding: 6px 12px;
            border: var(--border);
            background: transparent;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.15s;
        }
        nav a:hover {
            background: var(--black);
            color: var(--yellow);
        }

        /* Hamburger */
        .hamburger {
            display: none;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
            background: var(--black);
            border: var(--border);
            padding: 10px 12px;
            box-shadow: 3px 3px 0 var(--black);
            flex-shrink: 0;
        }
        .hamburger span {
            display: block;
            width: 22px;
            height: 2.5px;
            background: var(--yellow);
            border-radius: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
            transform-origin: center;
        }
        .hamburger.open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
        .hamburger.open span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

        /* Desktop nav */
        #nav-menu { display: flex; }

        /* ========================
           RESPONSIVE — TABLET & MOBILE
        ======================== */

        /* Tablet (≤900px) */
        @media (max-width: 900px) {
            .hero-grid,
            .about-grid,
            .contact-grid {
                grid-template-columns: 1fr;
                gap: 2.5rem;
            }
            .footer-grid {
                grid-template-columns: 1fr 1fr;
                gap: 2rem;
            }
            .hero-img-wrap {
                max-width: 380px;
                margin: 0 auto;
            }
            .contact-grid { gap: 3rem; }
        }

        /* Mobile (≤768px) — Hamburger menu on */
        @media (max-width: 768px) {
            header { padding: 0 1rem; }

            .nav-inner { height: 60px; }

            .hamburger { display: flex; }

            /* Mobile nav overlay */
            #nav-menu {
                display: none;
                position: fixed;
                top: 60px;
                left: 0;
                right: 0;
                bottom: 0;
                background: var(--yellow);
                border-top: var(--border);
                padding: 1.5rem 1rem;
                overflow-y: auto;
                z-index: 99;
                /* Slide-down animation */
                transform: translateY(-10px);
                opacity: 0;
                transition: transform 0.25s ease, opacity 0.25s ease;
            }
            #nav-menu.open {
                display: block;
                transform: translateY(0);
                opacity: 1;
            }

            nav ul {
                flex-direction: column;
                gap: 8px;
                padding: 0;
            }
            nav ul li { width: 100%; }
            nav a {
                display: block;
                width: 100%;
                font-size: 1.1rem;
                padding: 14px 20px;
                border: var(--border);
                background: var(--white);
                box-shadow: 4px 4px 0 var(--black);
                letter-spacing: 1px;
            }
            nav a:hover, nav a:active {
                background: var(--black);
                color: var(--yellow);
                transform: translate(-2px, -2px);
                box-shadow: 6px 6px 0 var(--black);
            }

            /* Sections */
            section { padding: 4rem 1rem; }
            #home { padding-top: 6rem; min-height: auto; }

            .hero-grid { grid-template-columns: 1fr; gap: 2rem; text-align: center; }
            .hero-badge { font-size: 0.65rem; }
            .hero-name { font-size: clamp(2.4rem, 10vw, 3.5rem); letter-spacing: -1px; }
            .hero-role { font-size: 0.85rem; }
            .hero-img-wrap { max-width: 300px; margin: 0 auto; }
            .hero-deco, .hero-deco-2 { display: none; }

            .about-grid { grid-template-columns: 1fr; gap: 2rem; }
            .about-text { font-size: 0.9rem; }
            .about-right h3 { font-size: 1.4rem; }
            .social-row { gap: 8px; }
            .social-btn { font-size: 0.7rem; padding: 7px 12px; }

            .portfolio-grid { grid-template-columns: 1fr; }

            .cert-grid { grid-template-columns: 1fr; }

            .contact-grid { grid-template-columns: 1fr; gap: 2rem; }
            .contact-info h2 { font-size: 1.6rem; }

            .footer-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
                padding-bottom: 2rem;
            }
            .footer-name { font-size: 1.5rem; }
            .footer-bottom {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .section-title { font-size: clamp(1.8rem, 8vw, 2.8rem); }
        }

        /* Small mobile (≤480px) */
        @media (max-width: 480px) {
            .logo { font-size: 0.85rem; padding: 5px 10px; }
            .hero-name { font-size: clamp(2rem, 11vw, 3rem); }
            .btn-primary { font-size: 0.8rem; padding: 12px 20px; width: 100%; text-align: center; }
            .portfolio-grid { gap: 1.5rem; }
            .cert-grid { gap: 1.5rem; }
            .ticker span { font-size: 0.7rem; padding: 0 1.2rem; }
        }

        /* ========================
           SECTIONS COMMON
        ======================== */
        section { padding: 6rem 2rem; }
        .container { max-width: 1200px; margin: 0 auto; }

        .section-tag {
            display: inline-block;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: var(--black);
            color: var(--yellow);
            padding: 4px 12px;
            border: var(--border);
            margin-bottom: 1rem;
        }

        .section-title {
            font-family: 'Epilogue', sans-serif;
            font-weight: 900;
            font-size: clamp(2rem, 5vw, 3.5rem);
            line-height: 1;
            color: var(--black);
        }

        /* ========================
           HERO
        ======================== */
        #home {
            padding-top: 9rem;
            background: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
        }

        .hero-badge {
            display: inline-block;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: var(--border);
            padding: 6px 16px;
            background: var(--pink);
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
        }

        .hero-name {
            font-family: 'Epilogue', sans-serif;
            font-weight: 900;
            font-size: clamp(2.8rem, 7vw, 5.5rem);
            line-height: 0.95;
            letter-spacing: -2px;
            margin-bottom: 1.5rem;
        }

        .hero-name .highlight {
            background: var(--yellow);
            padding: 0 8px;
            border: var(--border);
            display: inline;
        }

        .hero-role {
            font-family: 'Space Mono', monospace;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            line-height: 1.6;
            margin-bottom: 2.5rem;
            color: #444;
        }

        .hero-role strong { color: var(--black); }

        .btn-primary {
            display: inline-block;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 14px 28px;
            background: var(--black);
            color: var(--yellow);
            border: var(--border);
            box-shadow: var(--shadow-lg);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn-primary:hover {
            transform: translate(-3px, -3px);
            box-shadow: 11px 11px 0px var(--black);
        }

        .hero-img-wrap {
            position: relative;
        }

        .hero-img-frame {
            border: var(--border);
            box-shadow: var(--shadow-lg);
            background: var(--yellow);
            overflow: hidden;
            position: relative;
        }

        .hero-img-frame img {
            width: 100%;
            display: block;
        }

        .hero-deco {
            position: absolute;
            bottom: -16px;
            right: -16px;
            width: 120px;
            height: 120px;
            background: var(--pink);
            border: var(--border);
            z-index: -1;
        }

        .hero-deco-2 {
            position: absolute;
            top: -16px;
            left: -16px;
            width: 80px;
            height: 80px;
            background: var(--blue);
            border: var(--border);
            z-index: -1;
        }

        /* ========================
           ABOUT
        ======================== */
        #about {
            background: var(--black);
            color: var(--white);
        }

        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: start;
        }

        #about .section-tag {
            background: var(--yellow);
            color: var(--black);
            border-color: var(--yellow);
        }

        #about .section-title { color: var(--white); }

        .about-text {
            font-size: 1rem;
            line-height: 1.8;
            color: #ccc;
            margin-top: 1.5rem;
            border-left: 4px solid var(--yellow);
            padding-left: 1.5rem;
        }

        .about-right h3 {
            font-family: 'Epilogue', sans-serif;
            font-weight: 900;
            font-size: 1.8rem;
            color: var(--yellow);
            margin-bottom: 1rem;
        }

        .about-right p {
            font-size: 0.95rem;
            line-height: 1.7;
            color: #ccc;
            margin-bottom: 2rem;
        }

        .social-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .social-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border: 2px solid var(--white);
            color: var(--white);
            text-decoration: none;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.15s;
            box-shadow: 3px 3px 0 var(--white);
        }
        .social-btn:hover {
            background: var(--yellow);
            border-color: var(--yellow);
            color: var(--black);
            box-shadow: 3px 3px 0 var(--yellow);
        }

        /* ========================
           PORTFOLIO
        ======================== */
        #portofolio {
            background: var(--yellow);
        }

        .portfolio-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }

        .portfolio-card {
            background: var(--white);
            border: var(--border);
            box-shadow: var(--shadow-lg);
            transition: transform 0.15s, box-shadow 0.15s;
            overflow: hidden;
        }
        .portfolio-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px var(--black);
        }

        .portfolio-card-img {
            display: block;
            overflow: hidden;
            border-bottom: var(--border);
            aspect-ratio: 16/9;
        }
        .portfolio-card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s;
        }
        .portfolio-card:hover .portfolio-card-img img {
            transform: scale(1.05);
        }

        .portfolio-card-body {
            padding: 1.5rem;
        }

        .portfolio-card-body h3 {
            font-family: 'Epilogue', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            margin-bottom: 0.75rem;
        }

        .portfolio-card-body p {
            font-size: 0.85rem;
            line-height: 1.6;
            color: #555;
        }

        /* ========================
           SERTIFIKAT
        ======================== */
        #sertifikat {
            background: var(--blue);
        }

        #sertifikat .section-tag {
            background: var(--white);
            color: var(--black);
        }

        #sertifikat .section-title { color: var(--white); }

        .sertifikat-sub {
            color: var(--white);
            font-size: 0.95rem;
            margin-top: 1rem;
            max-width: 500px;
        }

        .cert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .cert-card {
            background: var(--white);
            border: var(--border);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .cert-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px var(--black);
        }

        .cert-card a {
            display: block;
            border-bottom: var(--border);
            overflow: hidden;
        }
        .cert-card img {
            width: 100%;
            display: block;
            transition: transform 0.3s;
        }
        .cert-card:hover img { transform: scale(1.04); }

        .cert-card-body {
            padding: 1.25rem;
        }
        .cert-card-body h3 {
            font-family: 'Epilogue', sans-serif;
            font-weight: 900;
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }
        .cert-card-body p {
            font-size: 0.82rem;
            line-height: 1.5;
            color: #555;
        }

        /* ========================
           CONTACT
        ======================== */
        #contact {
            background: var(--white);
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 4rem;
            align-items: start;
        }

        .contact-info h2 {
            font-family: 'Epilogue', sans-serif;
            font-weight: 900;
            font-size: 2rem;
            line-height: 1.1;
            margin: 1rem 0;
        }

        .contact-info p {
            font-size: 0.95rem;
            line-height: 1.7;
            color: #555;
            margin-bottom: 2rem;
        }

        .contact-detail {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border: var(--border);
            background: var(--yellow);
            box-shadow: var(--shadow);
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .contact-form-wrap { }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: var(--border)
